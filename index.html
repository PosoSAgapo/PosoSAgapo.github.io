<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的GitHub Pages网站</title>

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.15/dist/tailwind.min.css" rel="stylesheet">

  <!-- 自定义样式 -->
  <style>
    .gradient {
      background: linear-gradient(90deg, #d53369 0%, #daae51 100%);
    }
  </style>
</head>

<body class="bg-gray-100 font-sans leading-normal tracking-normal">
  <nav id="header" class="fixed w-full z-10 top-0 gradient">
    <div class="w-full container mx-auto flex flex-wrap items-center justify-between mt-0 py-2">
      <div class="pl-4 flex items-center">
        <a class="text-white text-base no-underline hover:no-underline font-extrabold text-xl" href="#">
          我的GitHub Pages网站
        </a>
      </div>

      <div class="block lg:hidden pr-4">
        <button id="nav-toggle" class="flex items-center px-3 py-2 border rounded text-white border-white hover:text-white hover:border-white">
          <svg class="fill-current h-3 w-3" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <title>Menu</title>
            <path d="M0 3h20v2H0V3zm0 6h20v2H0V9zm0 6h20v2H0v15z" />
          </svg>
        </button>
      </div>

      <div class="w-full flex-grow lg:flex lg:items-center lg:w-auto hidden mt-2 lg:mt-0 bg-white lg:bg-transparent text-black p-4 lg:p-0 z-20" id="nav-content">
        <ul class="list-reset lg:flex justify-end flex-1 items-center">
          <li class="mr-3">
            <a class="inline-block py-2 px-4 text-white no-underline" href="#">主页</a>
          </li>
          <li class="mr-3">
            <a class="inline-block text-gray-400 no-underline hover:text-gray-100 hover:text-underline py-2 px-4" href="#">关于我</a>
          </li>
          <li class="mr-3">
            <a class="inline-block text-gray-400 no-underline hover:text-gray-100 hover:text-underline py-2 px-4" href="#">我的项目</a>
          </li>
        </ul>
        <a href="https://github.com/你的用户名" id="navAction" class="mx-auto lg:mx-0 hover:underline bg-white text-gray-800 font-extrabold rounded mt-4 lg:mt-0 py-4 px-8 shadow opacity-75" target="_blank">
          访问我的GitHub
        </a>
      </div>
    </div>
    <hr class="border-b border-gray-100 opacity-25 my-0 py-0" />
  </nav>

  <section class="bg-white py-8">
    <div class="container mx-auto flex flex-wrap pt-4 pb-12">
      <h1 class="w-full my-2 text-5xl font-bold leading-tight text-center text-gray-800">
        欢迎来到我的网站
      </h1>
      <div class="w-full mb-4">
        <div class="h-1 mx-auto gradient w-64 opacity-25 my-0 py-0 rounded-t"></div>
      </div>
      <div class="w-full md:w-1/3 p-6 flex flex-col flex-grow flex-shrink">
        <div class="flex-1 bg-white text-gray-600 rounded-t rounded-b-none overflow-hidden shadow">
          <p class="w-full text-gray-600 text-xs md:text-sm px-6">关于我</p>
          <div class="w-full font-bold text-xl text-gray-800 px-6">在这里写一些关于你自己的信息。</div>
          <p class="text-gray-800 text-base px-6 mb-5">你可以详细地介绍你自己，比如你的技能、爱好或者你为什么喜欢编程。</p>
        </div>
      </div>
      <div class="w-full md:w-1/3 p-6 flex flex-col flex-grow flex-shrink">
        <div class="flex-1 bg-white text-gray-600 rounded-t rounded-b-none overflow-hidden shadow">
          <p class="w-full text-gray-600 text-xs md:text-sm px-6">我的项目</p>
          <div class="w-full font-bold text-xl text-gray-800 px-6">在这里列出你的一些项目。</div>
          <p class="text-gray-800 text-base px-6 mb-5">你可以提供一些你的项目的链接，或者你想分享的其他内容。</p>
        </div>
      </div>
    </div>
  </section>

</body>

</html>
